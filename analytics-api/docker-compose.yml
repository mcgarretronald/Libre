version: '3.8'

services:

  # Next.js web portal
  portal-web:
    build: .
    container_name: jacaranda-portal-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    command: ["node", "server.js"]
    networks:
      - portal-network

  # Background cron worker that sends campaign emails
  portal-cron:
    build: .
    container_name: jacaranda-portal-cron
    restart: unless-stopped
    env_file:
      - .env.local
    command: ["node", "cron-worker.js"]
    networks:
      - portal-network

networks:
  portal-network:
    driver: bridge
