networks:
  librechat_network:
    driver: bridge

services:
  librechat:
    build:
      context: .
      dockerfile: Dockerfile.libre
    container_name: librechat_app
    ports:
      - "3080:3080"
    env_file:
      - .env
    environment:
      - PORT=3080
      - HOST=0.0.0.0
    volumes:
      - ./librechat.yaml:/app/librechat.yaml
    networks:
      - librechat_network
    restart: always
